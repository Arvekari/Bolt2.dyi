site_name: Opurion Docs
site_dir: ../site
docs_dir: .
exclude_docs: /README.md
theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - toc.follow
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    # - navigation.instant
    # - navigation.tracking
    # - navigation.tabs.sticky
    # - navigation.expand
    # - content.code.annotate
  icon:
    repo: fontawesome/brands/github
  # logo: assets/logo.png
  # favicon: assets/logo.png
repo_name: Opurion
repo_url: https://github.com/Arvekari/Opurion
edit_uri: ''

nav:
  - Home: index.md
  - AI:
      - Functions:
          - Overview: ai/functions/README.md
          - Opurion Execution Protocol: ai/functions/bolt-protocol.md
  - Setup:
      - Installation: setup/installation.md
      - Docker:
          - Development: setup/docker/development.md
          - Production: setup/docker/production.md
          - Volumes: setup/docker/volumes.md
          - External PostgreSQL/PostgREST: setup/docker/external-postgres.md
          - External OpenClaw: setup/docker/external-openclaw.md
      - Docker Runtime:
          - Overview: docker/README.md
          - Install Guide: docker/docker-install.md
          - Scripts: docker/scripts.md
          - Stack Guide: docker/stack.md
          - Composed Stack: docker/composed/README.md
      - Single Host:
          - Linux: setup/single-host/linux.md
          - macOS: setup/single-host/osx.md
          - Windows: setup/single-host/windows.md
  - Architecture:
      - Overview: architecture/overview.md
      - Project Guide: architecture/project.md
      - Layering: architecture/layering.md
      - Dependency Rules: architecture/dependency-rules.md
  - Database:
      - Overview: database/overview.md
      - PostgreSQL: database/postgresql.md
      - PostgREST: database/postgrest.md
      - SQLite: database/sqlite.md
      - Migrations: database/migrations.md
  - Integrations:
      - Overview: integrations/overview.md
      - OpenClaw: integrations/openclaw.md
      - MCP: integrations/mcp.md
  - Security:
      - Overview: security/overview.md
      - Authentication: security/authentication.md
      - RBAC: security/rbac.md
      - Encryption: security/encryption.md
      - Audit Logging: security/audit-logging.md
  - API:
      - Overview: api/overview.md
      - Endpoints: api/endpoints.md
      - Authentication: api/authentication.md
      - Integrations: api/integrations.md
  - Development:
      - Local Dev: development/local-dev.md
      - Testing: development/testing.md
      - Migration Guide: development/migration-guide.md
  - Operations:
      - Deployment: operations/deployment.md
      - Environment Variables: operations/environment-variables.md
      - Health Monitoring: operations/health-monitoring.md
      - Troubleshooting: operations/troubleshooting.md
      - Changes: operations/changes.md
      - Changes Done: operations/changes-done.md
  - FAQ: FAQ.md
  - Contributing: CONTRIBUTING.md

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Arvekari/Opurion
      name: Opurion
    - icon: fontawesome/brands/discourse
      link: https://thinktank.ottomator.ai/
      name: Opurion Discourse
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/opurion
      name: Opurion on X
    - icon: fontawesome/brands/bluesky
      link: https://bsky.app/profile/opurion
      name: Opurion on Bluesky

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables
  - def_list
  - admonition
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
