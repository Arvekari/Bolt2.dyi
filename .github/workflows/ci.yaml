name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

# Cancel in-progress runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce changelog update
        run: node scripts/verify-changelog-ci.mjs
        env:
          CHANGELOG_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          CHANGELOG_HEAD_REF: ${{ github.sha }}

      - name: Setup and Build
        uses: ./.github/actions/setup-and-build

      - name: Cache TypeScript compilation
        uses: actions/cache@v4
        with:
          path: |
            .tsbuildinfo
            node_modules/.cache
          key: ${{ runner.os }}-typescript-${{ hashFiles('**/tsconfig.json', 'app/**/*.ts', 'app/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-typescript-

      - name: Run type check
        run: pnpm run typecheck

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/eslint
          key: ${{ runner.os }}-eslint-${{ hashFiles('.eslintrc*', 'app/**/*.ts', 'app/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-eslint-

      - name: Run ESLint
        run: |
          BASE_SHA="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          if [ -n "$BASE_SHA" ] && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ]; then
            CHANGED_APP_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- 'app/**/*.ts' 'app/**/*.tsx')
          else
            CHANGED_APP_FILES=$(git diff-tree --no-commit-id --name-only -r "$HEAD_SHA" -- 'app/**/*.ts' 'app/**/*.tsx')
          fi

          if [ -z "$CHANGED_APP_FILES" ]; then
            echo "No changed app TypeScript files to lint in this range; skipping ESLint step."
            exit 0
          fi

          echo "$CHANGED_APP_FILES" | while IFS= read -r file; do
            [ -n "$file" ] && git add "$file"
          done

          pnpm run lint:staged

      - name: Run tests
        run: pnpm run test

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  docker-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker production build
        run: |
          echo "🐳 Testing Docker production target..."
          docker build -f docs/docker/composed/Dockerfile --target bolt2-dyi-production . --no-cache --progress=plain
          echo "✅ Production target builds successfully"

      - name: Validate Docker development build
        run: |
          echo "🐳 Testing Docker development target..."
          docker build -f docs/docker/composed/Dockerfile --target development . --no-cache --progress=plain
          echo "✅ Development target builds successfully"

      - name: Validate docker-compose configuration
        run: |
          echo "🐳 Validating docker-compose configuration..."
          docker compose -f docs/docker/composed/docker-compose.yaml config --quiet
          echo "✅ docker-compose configuration is valid"
