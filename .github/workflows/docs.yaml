name: Docs CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**' # This will only trigger the workflow when files in docs directory change
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build_docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ runner.os }}-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Install docs dependencies
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build --strict -f docs/mkdocs.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy_docs:
    needs: build_docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check GitHub Pages configuration
        id: pages_check
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.getPages({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              core.setOutput('enabled', 'true');
              core.info('GitHub Pages is enabled.');
            } catch (error) {
              if (error.status === 404) {
                core.warning('GitHub Pages is not enabled for this repository. Skipping deploy step.');
                core.setOutput('enabled', 'false');
                return;
              }

              throw error;
            }

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.pages_check.outputs.enabled == 'true'
        uses: actions/deploy-pages@v4

      - name: Skip deploy when Pages disabled
        if: steps.pages_check.outputs.enabled != 'true'
        run: echo "GitHub Pages is not enabled for this repository; docs deploy skipped intentionally."
